version: "3.8"

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: cloudsieve-backend
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    environment:
      - ENVIRONMENT=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - cloudsieve-net

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: cloudsieve-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cloudsieve-net

volumes:
  uploads_data:
    driver: local
  outputs_data:
    driver: local

networks:
  cloudsieve-net:
    driver: bridge
