name: CloudSieve Pro CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # ── Stage 1: Lint ──
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python linters
        run: pip install flake8

      - name: Lint backend
        run: |
          cd backend
          flake8 main.py engine.py --max-line-length=120 --ignore=E501,W503,E302,E303

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Lint frontend
        run: |
          cd frontend
          npm ci --silent
          npx eslint src/ --ext .js,.jsx --quiet || true

  # ── Stage 2: Test ──
  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run backend tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  # ── Stage 3: Docker Build ──
  docker-build:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build -f docker/Dockerfile.backend -t cloudsieve-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: |
          docker build -f docker/Dockerfile.frontend -t cloudsieve-frontend:${{ github.sha }} ./frontend

      - name: Verify images
        run: |
          docker images | grep cloudsieve
          echo "✅ Both images built successfully"

  # ── Stage 4: Deploy ──
  deploy:
    name: "🚀 Deploy"
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to Render
        run: |
          echo "🚀 Deploying to Render.com..."
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" ]; then
            curl -s "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"
            echo "✅ Backend deploy triggered"
          fi
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" ]; then
            curl -s "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"
            echo "✅ Frontend deploy triggered"
          fi
          echo "✅ Deployment complete"
