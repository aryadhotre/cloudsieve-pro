# aws/cloudformation.yaml
# CloudSieve — AWS Infrastructure as Code
# Deploy with: aws cloudformation deploy --template-file cloudformation.yaml --stack-name cloudsieve --capabilities CAPABILITY_IAM

AWSTemplateFormatVersion: '2010-09-09'
Description: CloudSieve — Intelligent Data Deduplication & Quality Engine

Parameters:
  ProjectName:
    Type: String
    Default: cloudsieve
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]

Resources:

  # ─────────────────────────────────────────────
  # S3 BUCKETS
  # ─────────────────────────────────────────────
  RawBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-raw-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: 's3:ObjectCreated:*'
            Filter:
              S3Key:
                Rules:
                  - Name: suffix
                    Value: .csv
            Function: !GetAtt TriggerLambda.Arn

  CleanBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-clean-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ScriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-scripts-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # ─────────────────────────────────────────────
  # DYNAMODB TABLE
  # ─────────────────────────────────────────────
  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cloudsieve-jobs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ─────────────────────────────────────────────
  # IAM ROLES
  # ─────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CloudSieveLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['s3:GetObject', 's3:PutObject', 's3:ListBucket']
                Resource:
                  - !GetAtt RawBucket.Arn
                  - !Sub '${RawBucket.Arn}/*'
                  - !GetAtt CleanBucket.Arn
                  - !Sub '${CleanBucket.Arn}/*'
              - Effect: Allow
                Action: ['dynamodb:PutItem', 'dynamodb:UpdateItem', 'dynamodb:GetItem']
                Resource: !GetAtt JobsTable.Arn
              - Effect: Allow
                Action: ['glue:StartJobRun', 'glue:GetJobRun']
                Resource: '*'
              - Effect: Allow
                Action: ['sns:Publish']
                Resource: !Ref AlertTopic

  GlueExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-glue-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: CloudSieveGluePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['s3:*']
                Resource:
                  - !GetAtt RawBucket.Arn
                  - !Sub '${RawBucket.Arn}/*'
                  - !GetAtt CleanBucket.Arn
                  - !Sub '${CleanBucket.Arn}/*'
                  - !GetAtt ScriptsBucket.Arn
                  - !Sub '${ScriptsBucket.Arn}/*'
              - Effect: Allow
                Action: ['dynamodb:UpdateItem', 'dynamodb:GetItem']
                Resource: !GetAtt JobsTable.Arn

  # ─────────────────────────────────────────────
  # LAMBDA FUNCTION
  # ─────────────────────────────────────────────
  TriggerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-trigger'
      Runtime: python3.11
      Handler: lambda_trigger.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          DYNAMODB_TABLE: cloudsieve-jobs
          GLUE_JOB: !Ref GlueJob
          CLEAN_BUCKET: !Ref CleanBucket
          ALERT_TOPIC: !Ref AlertTopic
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'placeholder - upload lambda_trigger.py'}

  LambdaS3Permission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt TriggerLambda.Arn
      Principal: s3.amazonaws.com
      SourceArn: !Sub 'arn:aws:s3:::${ProjectName}-raw-${AWS::AccountId}'

  # ─────────────────────────────────────────────
  # GLUE JOB
  # ─────────────────────────────────────────────
  GlueJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub '${ProjectName}-dedup-job'
      Role: !GetAtt GlueExecutionRole.Arn
      GlueVersion: '3.0'
      NumberOfWorkers: 2
      WorkerType: G.1X
      Timeout: 60
      Command:
        Name: glueetl
        ScriptLocation: !Sub 's3://${ScriptsBucket}/scripts/glue_job.py'
        PythonVersion: '3'
      DefaultArguments:
        '--job-language': python
        '--job-bookmark-option': job-bookmark-disable
        '--TempDir': !Sub 's3://${ScriptsBucket}/temp/'
        '--enable-metrics': 'true'
        '--enable-continuous-cloudwatch-log': 'true'

  # ─────────────────────────────────────────────
  # SNS ALERT TOPIC
  # ─────────────────────────────────────────────
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${ProjectName}-alerts'
      DisplayName: CloudSieve Quality Alerts

  # ─────────────────────────────────────────────
  # CLOUDWATCH DASHBOARD
  # ─────────────────────────────────────────────
  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub '${ProjectName}-dashboard'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "properties": {
                "title": "Lambda Invocations",
                "metrics": [["AWS/Lambda", "Invocations", "FunctionName", "${TriggerLambda}"]],
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "properties": {
                "title": "Lambda Errors",
                "metrics": [["AWS/Lambda", "Errors", "FunctionName", "${TriggerLambda}"]],
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "properties": {
                "title": "Glue Job Duration",
                "metrics": [["Glue", "glue.driver.ExecutorRunTime"]],
                "period": 300,
                "stat": "Average"
              }
            }
          ]
        }

Outputs:
  RawBucketName:
    Value: !Ref RawBucket
    Export:
      Name: !Sub '${ProjectName}-raw-bucket'
  CleanBucketName:
    Value: !Ref CleanBucket
    Export:
      Name: !Sub '${ProjectName}-clean-bucket'
  JobsTableName:
    Value: !Ref JobsTable
    Export:
      Name: !Sub '${ProjectName}-jobs-table'
  TriggerLambdaArn:
    Value: !GetAtt TriggerLambda.Arn
  AlertTopicArn:
    Value: !Ref AlertTopic
